name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-frontend-vercel:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm i -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-voice-render:
    name: Deploy Voice Backend (Render)
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Optional health check
        if: ${{ secrets.RENDER_HEALTHCHECK_URL != '' }}
        run: |
          for i in $(seq 1 20); do
            if curl -fsS "${{ secrets.RENDER_HEALTHCHECK_URL }}"; then
              echo "Render health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Render health check did not pass in time"
          exit 1
