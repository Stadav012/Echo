version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - voice

  voice:
    build:
      context: ./backend/voicecall-module
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/voicecall-module/.env
